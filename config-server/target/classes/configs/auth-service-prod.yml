spring:
  datasource:
    url: jdbc:mysql://${PROD_DB_HOST:prod-mysql}:${PROD_DB_PORT:3306}/${DB_NAME:auth_db}?useSSL=true&serverTimezone=UTC
    username: ${PROD_DB_USER:admin}
    password: ${PROD_DB_PASSWORD:SecurePassword@123}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET_KEY:stationeryManagementSecretKey2024StationeryAppSecureProdSecretKey}
  expiration: 86400000

logging:
  level:
    com.stationery.auth: INFO
    org.springframework: WARN
