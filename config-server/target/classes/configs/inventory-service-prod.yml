spring:
  datasource:
    url: jdbc:mysql://${PROD_DB_HOST:prod-mysql}:${PROD_DB_PORT:3306}/${DB_NAME:inventory_db}?useSSL=true&serverTimezone=UTC
    username: ${PROD_DB_USER:admin}
    password: ${PROD_DB_PASSWORD:SecurePassword@123}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.stationery.inventory: INFO
    org.springframework: WARN
