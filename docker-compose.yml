# ============================================================
# Stationery Management System - Docker Compose Orchestration
# ============================================================
# Usage:
#   docker-compose up --build        (build & start all services)
#   docker-compose up -d             (start in detached mode)
#   docker-compose down              (stop all services)
#   docker-compose down -v           (stop & remove volumes)
#   docker-compose logs -f <service> (follow logs for a service)
# ============================================================


# tells docker compose which file format grammar to use, 3.8 is modern version.
version: '3.8'
name: sms

# is it the main section. every entry under it becomes one docker container. all the cotainers are start, stopped and managed together.
services:

  # ──────────────────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────────────────
  mysql: #service name
    image: mysql:8.0 #base image
    container_name: sms-mysql #name of the container
    restart: unless-stopped #restart policy - auto-restart ALWAYS, EXCEPT if you manually stopped it.
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%' # allow root access from any host ( coz auth-services and all are in other containers)
    ports:
      - "3307:3306" #your PC accesses MySQL via port 3307, but inside docker network it's still 3306
    volumes:
      - mysql_data:/var/lib/mysql #name of docker-managed volume : path inside container where mysql stores data
      - ./mysql:/docker-entrypoint-initdb.d:ro #local folder : mySQL auto runs every .sql or .sh file in this folder.
    networks:
      - sms-network #connects this service to docker network.
    healthcheck: #checks if the service is healthy
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s #how often docker run health check
      timeout: 5s #how long will it take to complete the health check
      retries: 10 #how many times to retry before marking service as unhealthy
      start_period: 30s #Gives MySQL time to do its initial setup before we judge it.

  # ──────────────────────────────────────────────────────────
  # Spring Cloud Config Server
  # ──────────────────────────────────────────────────────────
  config-server:
    build: #build docker image from source code
      context: ./config-server #folder where Dockerfile is located
      dockerfile: Dockerfile #file name
    container_name: sms-config-server #name of the container
    restart: unless-stopped #restart policy - auto-restart ALWAYS, EXCEPT if you manually stopped it.
    ports:
      - "8888:8888" #http://localhost:8888/actuator/health check for status
    depends_on: #start THIS service only AFTER the listed services are healthy
      mysql:
        condition: service_healthy
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # Eureka Service Discovery Server
  # ──────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: sms-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment: #These environment variables OVERRIDE values in application.yml at runtime.
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_SERVER_PEER_NODE_READ_TIMEOUT_MS: "20000"
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: sms-api-gateway
    restart: unless-stopped
    ports:
      - "8090:8090" #The frontend calls http://localhost:8090/api/...
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # Auth Service
  # ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: sms-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SERVICES_REQUEST_SERVICE_URL: http://request-service:8083
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ──────────────────────────────────────────────────────────
  # Inventory Service
  # ──────────────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: sms-inventory-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SERVICES_REQUEST_SERVICE_URL: http://request-service:8083
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ──────────────────────────────────────────────────────────
  # Request Service
  # ──────────────────────────────────────────────────────────
  request-service:
    build:
      context: ./request-service
      dockerfile: Dockerfile
    container_name: sms-request-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/request_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ──────────────────────────────────────────────────────────
  # React Frontend (served via Nginx)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms-frontend
    restart: unless-stopped
    ports:
      - "3000:80" #Nginx listens on port 80 INSIDE the container
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8090
    networks:
      - sms-network

# ──────────────────────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────────────────────
volumes:
  mysql_data: #Docker creates and manages this storage area on your HOST machine's disk.
    driver: local

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  sms-network:
    driver: bridge
    name: sms-network
