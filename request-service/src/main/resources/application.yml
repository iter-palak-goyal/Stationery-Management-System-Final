spring:
  application:
    name: request-service
  config:
    import: optional:configserver:http://localhost:8888

  # Fallback configuration (used when Config Server is unavailable)
  datasource:
    url: jdbc:mysql://localhost:3306/request_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.stationery.request: DEBUG
    org.springframework.cloud: DEBUG
